<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 자기 발전 - SK아카데미</title>
<style>
  :root {
    --bg: #f5f7fa; --card: #ffffff; --text: #1a202c;
    --text-sub: #4a5568; --text-muted: #718096;
    --border: #e2e8f0; --accent: #3182ce; --accent-hover: #2c5282;
    --success: #38a169; --danger: #e53e3e; --warning: #d69e2e;
    --gold: #f6ad55; --purple: #805ad5;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.08);
  }
  [data-theme="dark"] {
    --bg: #0f1419; --card: #1a202c; --text: #f7fafc;
    --text-sub: #cbd5e0; --text-muted: #a0aec0;
    --border: #2d3748; --accent: #63b3ed; --accent-hover: #4299e1;
    --success: #68d391; --danger: #fc8181; --warning: #f6ad55;
    --gold: #fbd38d; --purple: #b794f4;
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 24px; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 16px; }
  .nav { display: flex; gap: 8px; }
  .nav a { padding: 8px 14px; border-radius: 8px; text-decoration: none; color: var(--text-sub); font-size: 14px; font-weight: 500; background: var(--card); border: 1px solid var(--border); }
  .nav a.active { background: var(--accent); color: white; border-color: var(--accent); }
  .header-left h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .header-left .subtitle { color: var(--text-muted); font-size: 14px; }
  .icon-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; box-shadow: var(--shadow); }

  .tip-banner { background: linear-gradient(135deg, var(--accent), var(--purple)); color: white; padding: 16px 20px; border-radius: 12px; margin-bottom: 16px; cursor: pointer; position: relative; box-shadow: var(--shadow-hover); }
  .tip-banner .tip-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; opacity: 0.9; }
  .tip-banner .tip-content { font-size: 15px; line-height: 1.5; }
  .tip-banner .tip-nav { position: absolute; top: 16px; right: 16px; font-size: 12px; opacity: 0.7; }

  .coin-badge { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, var(--gold), #ed8936); color: white; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow); }
  .combo-badge { display: inline-flex; align-items: center; gap: 4px; background: linear-gradient(135deg, #f56565, var(--gold)); color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; animation: comboFlash 0.5s ease; }
  @keyframes comboFlash { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat-card { background: var(--card); padding: 14px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .cert-value-card { background: linear-gradient(135deg, var(--success), #2f855a); color: white; padding: 16px; border-radius: 12px; margin-bottom: 16px; }
  .cert-value-card .cv-title { font-size: 14px; font-weight: 600; opacity: 0.9; margin-bottom: 6px; }
  .cert-value-card .cv-amount { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .cert-value-card .cv-desc { font-size: 13px; opacity: 0.9; line-height: 1.4; }
  .cert-value-card .cv-countdown { background: rgba(255,255,255,0.2); padding: 8px 12px; border-radius: 8px; margin-top: 10px; font-size: 13px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--card); padding: 6px; border-radius: 10px; border: 1px solid var(--border); overflow-x: auto; flex-wrap: wrap; }
  .tab { flex: 1; min-width: 75px; padding: 10px 6px; cursor: pointer; background: transparent; border: none; color: var(--text-sub); font-size: 12px; font-weight: 500; border-radius: 6px; white-space: nowrap; }
  .tab.active { background: var(--accent); color: white; }
  .tab.locked { background: #fef5e7; color: #c05621; }
  [data-theme="dark"] .tab.locked { background: rgba(246, 173, 85, 0.2); color: var(--gold); }

  .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 16px; }
  .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }

  .lesson-card { background: var(--card); border-radius: 12px; padding: 24px; border: 1px solid var(--border); margin-bottom: 12px; }
  .lesson-card.wrong-marked { border-color: var(--warning); border-width: 2px; }
  .lesson-card.review-due { border-color: var(--purple); border-width: 2px; }
  .lesson-num { display: inline-block; padding: 4px 12px; background: var(--accent); color: white; border-radius: 12px; font-size: 12px; font-weight: 600; margin-bottom: 12px; }
  .lesson-num.wrong { background: var(--warning); }
  .lesson-num.review { background: var(--purple); }
  .lesson-cat { display: inline-block; margin-left: 8px; padding: 4px 10px; background: var(--bg); border-radius: 12px; font-size: 12px; color: var(--text-sub); }
  .srs-badge { display: inline-block; margin-left: 6px; padding: 3px 8px; background: var(--purple); color: white; border-radius: 8px; font-size: 11px; }

  .lesson-ko { font-size: 18px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
  .lesson-en { font-size: 17px; color: var(--text-sub); margin-bottom: 8px; padding: 12px; background: var(--bg); border-radius: 8px; display: none; }
  .lesson-en.show { display: block; }
  .lesson-en .en-text { font-style: italic; }
  .lesson-pron { font-size: 14px; color: var(--gold); margin-top: 8px; font-weight: 500; }
  .lesson-pron::before { content: "🔤 "; }
  .lesson-romaji { font-size: 13px; color: var(--text-muted); margin-top: 6px; font-style: italic; }
  .lesson-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .srs-buttons { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); }

  .btn { padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; border: none; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn-success { background: var(--success); color: white; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-warning { background: var(--warning); color: white; }
  .btn-small { padding: 6px 12px; font-size: 13px; }
  .btn-srs-hard { background: var(--danger); color: white; }
  .btn-srs-soso { background: var(--warning); color: white; }
  .btn-srs-good { background: var(--success); color: white; }
  .btn-srs-easy { background: var(--purple); color: white; }

  .quiz-card { background: var(--card); border-radius: 12px; padding: 24px; border: 1px solid var(--border); margin-bottom: 16px; }
  .quiz-question { font-size: 17px; font-weight: 600; margin-bottom: 16px; line-height: 1.5; }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .quiz-option { padding: 14px 16px; background: var(--bg); border: 2px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.2s ease; font-size: 14px; line-height: 1.4; }
  .quiz-option:hover { border-color: var(--accent); transform: translateX(4px); }
  .quiz-option.correct { border-color: var(--success); background: var(--success); color: white; }
  .quiz-option.wrong { border-color: var(--danger); background: var(--danger); color: white; }
  .quiz-option.disabled { cursor: not-allowed; }
  .quiz-option.disabled:hover { transform: none; }

  .quiz-explanation { background: var(--bg); padding: 14px; border-radius: 8px; margin-top: 12px; font-size: 14px; color: var(--text-sub); line-height: 1.5; display: none; }
  .quiz-explanation.show { display: block; }
  .quiz-explanation strong { color: var(--text); }

  .lang-quiz-input { width: 100%; padding: 12px; font-size: 16px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); margin-bottom: 12px; }

  /* 빈칸 채우기 */
  .cloze-text { font-size: 17px; line-height: 1.8; margin-bottom: 16px; padding: 16px; background: var(--bg); border-radius: 8px; }
  .cloze-blank { display: inline-block; min-width: 80px; padding: 2px 8px; border: none; border-bottom: 2px solid var(--accent); background: transparent; color: var(--text); font-size: 17px; text-align: center; font-weight: 600; }
  .cloze-blank:focus { outline: none; border-bottom-color: var(--success); }
  .cloze-blank.correct { color: var(--success); border-bottom-color: var(--success); }
  .cloze-blank.wrong { color: var(--danger); border-bottom-color: var(--danger); }

  /* 발음 평가 */
  .pronunciation-card { background: linear-gradient(135deg, rgba(56,161,105,0.1), rgba(99,179,237,0.1)); border-left: 4px solid var(--success); padding: 16px; border-radius: 8px; margin-top: 12px; }
  .mic-button { width: 60px; height: 60px; border-radius: 50%; border: none; background: var(--danger); color: white; font-size: 24px; cursor: pointer; box-shadow: var(--shadow-hover); transition: all 0.2s ease; }
  .mic-button:hover { transform: scale(1.1); }
  .mic-button.recording { background: var(--success); animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .recognized-text { margin-top: 12px; padding: 12px; background: var(--bg); border-radius: 8px; font-size: 14px; min-height: 40px; }

  /* 비밀번호 화면 */
  .lock-screen { text-align: center; padding: 60px 20px; background: var(--card); border-radius: 12px; border: 1px solid var(--border); }
  .lock-screen .lock-icon { font-size: 64px; margin-bottom: 16px; }
  .lock-screen h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .lock-screen p { color: var(--text-muted); margin-bottom: 24px; }
  .pwd-input { width: 200px; padding: 14px; font-size: 24px; text-align: center; letter-spacing: 12px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }
  .pwd-input:focus { outline: none; border-color: var(--accent); }

  /* 프로젝트 콘텐츠 */
  .project-section { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 16px; }
  .project-section-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--accent); display: flex; align-items: center; gap: 8px; }
  .project-content { white-space: pre-line; line-height: 1.7; color: var(--text-sub); }
  .project-checklist-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .project-checklist-item:last-child { border-bottom: none; }
  .project-checklist-item input[type="checkbox"] { margin-top: 4px; }
  .project-checklist-item label { flex: 1; cursor: pointer; line-height: 1.5; }
  .project-checklist-item.checked label { text-decoration: line-through; color: var(--text-muted); }

  /* 계산기 */
  .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  @media (max-width: 500px) { .calc-grid { grid-template-columns: 1fr; } }
  .calc-field label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
  .calc-field input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 15px; }
  .calc-result { background: linear-gradient(135deg, var(--accent), var(--purple)); color: white; padding: 20px; border-radius: 12px; margin-top: 16px; }
  .calc-result-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.2); font-size: 14px; }
  .calc-result-row:last-child { border-bottom: none; }
  .calc-result-row.highlight { font-size: 20px; font-weight: 700; }

  .subcategory-tabs { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
  .subcategory-tab { padding: 8px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 13px; color: var(--text-sub); white-space: nowrap; }
  .subcategory-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

  .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .mode-toggle { display: flex; gap: 4px; margin-bottom: 16px; background: var(--card); padding: 4px; border-radius: 8px; border: 1px solid var(--border); flex-wrap: wrap; }
  .mode-btn { flex: 1; min-width: 70px; padding: 8px; cursor: pointer; background: transparent; border: none; color: var(--text-sub); font-size: 12px; border-radius: 6px; }
  .mode-btn.active { background: var(--accent); color: white; }
  .progress-bar { width: 100%; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; margin: 8px 0; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }
  .backup-section { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
  .backup-section input[type="file"] { display: none; }
  .toast { position: fixed; top: 24px; right: 24px; background: var(--card); border: 1px solid var(--border); padding: 14px 20px; border-radius: 8px; box-shadow: var(--shadow-hover); font-size: 14px; z-index: 1000; opacity: 0; transform: translateX(20px); transition: all 0.3s ease; }
  .toast.show { opacity: 1; transform: translateX(0); }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }
  .toast.coin { border-color: var(--gold); background: linear-gradient(135deg, var(--card), rgba(246,173,85,0.1)); }
  .mode-info { background: var(--bg); padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; color: var(--text-sub); }
  .level-bar { background: var(--bg); padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; border: 1px solid var(--border); }
  .level-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 13px; }
  .level-bar-progress { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .level-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--accent)); transition: width 0.5s ease; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="header-left">
        <h1>📚 자기 발전</h1>
        <div class="subtitle">매일 조금씩 꾸준히</div>
      </div>
      <div class="nav" style="margin-top:12px;">
        <a href="dashboard.html">📰 대시보드</a>
        <a href="study.html" class="active">📚 자기 발전</a>
      </div>
    </div>
    <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
      <span class="coin-badge" id="coin-badge">🪙 0 코인</span>
      <span class="combo-badge" id="combo-badge" style="display:none;">🔥 콤보 0</span>
      <button class="icon-btn" id="theme-toggle">🌙 다크</button>
    </div>
  </header>

  <div class="tip-banner" id="tip-banner" onclick="nextTip()">
    <div class="tip-title" id="tip-title">💡 빠른 습득 노하우</div>
    <div class="tip-content" id="tip-content">로딩 중...</div>
    <div class="tip-nav" id="tip-nav">1 / 10 (탭하여 다음)</div>
  </div>

  <div class="level-bar">
    <div class="level-bar-header">
      <span><strong id="level-display">레벨 1 · 새싹</strong></span>
      <span id="level-progress-text" style="color:var(--text-muted);">0 / 100 코인</span>
    </div>
    <div class="level-bar-progress"><div class="level-bar-fill" id="level-fill" style="width:0%"></div></div>
  </div>

  <div class="stats-grid" id="stats-grid"></div>

  <div class="tabs">
    <button class="tab active" data-tab="english">🌏 영어</button>
    <button class="tab" data-tab="japanese">🇯🇵 일본어</button>
    <button class="tab" data-tab="piping">🔧 배관</button>
    <button class="tab" data-tab="safety">⛑️ 산업안전</button>
    <button class="tab locked" data-tab="project">🔐 개인프로젝트</button>
    <button class="tab" data-tab="backup">💾 백업</button>
  </div>

  <div id="tab-english" class="tab-content">
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode-english="learn">📖 학습</button>
      <button class="mode-btn" data-mode-english="quiz_easy">🎯 4지선다</button>
      <button class="mode-btn" data-mode-english="cloze">🧩 빈칸채우기</button>
      <button class="mode-btn" data-mode-english="quiz_hard">✍️ 입력</button>
      <button class="mode-btn" data-mode-english="review">🔄 복습</button>
    </div>
    <div id="english-content"></div>
  </div>

  <div id="tab-japanese" class="tab-content" style="display:none;">
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode-japanese="learn">📖 학습</button>
      <button class="mode-btn" data-mode-japanese="quiz_easy">🎯 4지선다</button>
      <button class="mode-btn" data-mode-japanese="review">🔄 복습</button>
    </div>
    <div id="japanese-content"></div>
  </div>

  <div id="tab-piping" class="tab-content" style="display:none;">
    <div id="piping-value-card"></div>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode-piping="today">📝 오늘의 문제</button>
      <button class="mode-btn" data-mode-piping="review">🔄 복습</button>
    </div>
    <div id="piping-content"></div>
  </div>

  <div id="tab-safety" class="tab-content" style="display:none;">
    <div id="safety-value-card"></div>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode-safety="today">📝 오늘의 문제</button>
      <button class="mode-btn" data-mode-safety="review">🔄 복습</button>
    </div>
    <div id="safety-content"></div>
  </div>

  <div id="tab-project" class="tab-content" style="display:none;">
    <div id="project-content"></div>
  </div>

  <div id="tab-backup" class="tab-content" style="display:none;">
    <div class="card">
      <div class="card-title">💾 학습 기록 백업</div>
      <p style="color:var(--text-sub); font-size:14px; margin-bottom:16px;">
        브라우저에 자동 저장됩니다. PC 변경 시 JSON 다운로드 → 구글 드라이브 보관 가능
      </p>
      <div class="backup-section">
        <button class="btn btn-primary" id="btn-download">📥 다운로드</button>
        <button class="btn btn-secondary" id="btn-upload-trigger">📤 복원</button>
        <input type="file" id="file-upload" accept="application/json">
        <button class="btn btn-danger" id="btn-reset">🗑️ 초기화</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📊 학습 진행 상황</div>
      <div id="progress-detail"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let englishData = [], japaneseData = [], pipingData = [], safetyData = [], projectData = {};
const state = {
  activeTab: 'english',
  englishMode: 'learn',
  japaneseMode: 'learn',
  pipingMode: 'today',
  safetyMode: 'today',
  tipIndex: 0,
  projectAuthed: false,
  projectSubcat: '사전공부',
  combo: 0
};
const STORAGE_KEY = 'sk_study_data_v4';
const PROJECT_PWD = '0307';

// ============ 학습법 노하우 (10가지) ============
const STUDY_TIPS = [

// ============ SRS 알고리즘 ============
const SRS_INTERVALS = { hard: 1, soso: 3, good: 7, easy: 14 };

function calculateNextReview(currentInterval, difficulty) {
  let newInterval;
  if (difficulty === 'hard') newInterval = 1;
  else if (!currentInterval || currentInterval < SRS_INTERVALS[difficulty]) newInterval = SRS_INTERVALS[difficulty];
  else newInterval = Math.min(currentInterval * 2, 180);
  const nextDate = new Date();
  nextDate.setDate(nextDate.getDate() + newInterval);
  return { next_review: nextDate.toISOString().split('T')[0], interval: newInterval };
}

const COIN_RULES = { learn_card: 5, quiz_correct: 10, quiz_wrong: 2, master: 30, daily_streak: 20, combo_bonus: 5 };

function addCoins(amount, reason = "") {
  const data = loadStorage();
  if (!data.coins) data.coins = { total: 0, today: 0, history: [] };
  if (!data.coins.last_date || data.coins.last_date !== todayStr()) {
    data.coins.today = 0;
    data.coins.last_date = todayStr();
  }
  data.coins.total += amount;
  data.coins.today += amount;
  saveStorage(data);
  updateCoinBadge();
  if (amount >= 10) showToast(`🪙 +${amount} 코인 ${reason}`, 'coin');
}

function incrementCombo() {
  state.combo += 1;
  let bonus = 0;
  if (state.combo >= 10) bonus = COIN_RULES.combo_bonus * 3;
  else if (state.combo >= 5) bonus = COIN_RULES.combo_bonus * 2;
  else if (state.combo >= 3) bonus = COIN_RULES.combo_bonus;
  if (bonus > 0) addCoins(bonus, `(${state.combo}연속!)`);
  updateComboBadge();
}

function resetCombo() {
  if (state.combo >= 3) showToast(`콤보 ${state.combo} 종료`, 'error');
  state.combo = 0;
  updateComboBadge();
}

function updateComboBadge() {

    badge.style.display = 'inline-flex';

  }
}

function getLevel(totalCoins) {
  const levels = [
    { min: 0, max: 100, name: "🌱 새싹", level: 1 },
    { min: 100, max: 250, name: "🌿 잎", level: 2 },
    { min: 250, max: 500, name: "🌳 나무", level: 3 },
    { min: 500, max: 1000, name: "🌲 큰 나무", level: 4 },
    { min: 1000, max: 2000, name: "⭐ 별", level: 5 },
    { min: 2000, max: 4000, name: "🌟 슈퍼스타", level: 6 },
    { min: 4000, max: 8000, name: "💎 다이아", level: 7 },
    { min: 8000, max: Infinity, name: "👑 마스터", level: 8 }
  ];
  return levels.find(l => totalCoins >= l.min && totalCoins < l.max);
}

function updateCoinBadge() {
  const data = loadStorage();
  const coins = data.coins || { total: 0, today: 0 };
  document.getElementById('coin-badge').innerHTML = `🪙 ${coins.total} <span style="opacity:0.8;font-weight:400;">(+${coins.today})</span>`;
  const level = getLevel(coins.total);
  document.getElementById('level-display').textContent = `Lv.${level.level} · ${level.name}`;
  const progress = ((coins.total - level.min) / (level.max - level.min)) * 100;
  document.getElementById('level-fill').style.width = Math.min(progress, 100) + '%';
  document.getElementById('level-progress-text').textContent =
    level.max === Infinity ? '최고 레벨!' : `${coins.total} / ${level.max} 코인`;
}

// ============ 저장소 ============
function loadStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      // 마이그레이션 v3 → v4
      const v3 = localStorage.getItem('sk_study_data_v3');
      const v2 = localStorage.getItem('sk_study_data_v2');
      const source = v3 || v2;
      if (source) {
        const old = JSON.parse(source);
        const nd = defaultStorage();
        ['english', 'japanese', 'piping', 'safety'].forEach(c => {
          if (old[c]) nd[c] = {...nd[c], ...old[c]};
        });
        if (old.streak) nd.streak = old.streak;
        if (old.coins) nd.coins = old.coins;
        saveStorage(nd);
        return nd;
      }
      return defaultStorage();
    }
    const data = JSON.parse(raw);
    ['english', 'japanese', 'piping', 'safety'].forEach(c => {
      if (!data[c]) data[c] = { studied: {}, wrong: [], mastered: [], srs: {}, total_quizzes: 0, total_correct: 0 };
      if (!data[c].srs) data[c].srs = {};
    });
    if (!data.coins) data.coins = { total: 0, today: 0, last_date: null };
    if (!data.project_checklist) data.project_checklist = {};
    return data;
  } catch (e) { return defaultStorage(); }
}

function saveStorage(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch (e) { showToast('저장 실패', 'error'); }
}

function defaultStorage() {
  const cat = () => ({ studied: {}, wrong: [], mastered: [], srs: {}, total_quizzes: 0, total_correct: 0 });
  return {
    english: cat(), japanese: cat(), piping: cat(), safety: cat(),
    streak: { last_date: null, count: 0 },
    coins: { total: 0, today: 0, last_date: null, history: [] },
    project_checklist: {}
  };
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function updateStreak() {
  const data = loadStorage();
  const today = todayStr();
  const yesterday = (() => {
    const d = new Date(); d.setDate(d.getDate() - 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();
  if (data.streak.last_date === today) return data.streak.count;
  if (data.streak.last_date === yesterday) {
    data.streak.count += 1;
    addCoins(COIN_RULES.daily_streak, '(연속 학습 보너스!)');
  }
  else if (data.streak.last_date !== today) data.streak.count = 1;
  data.streak.last_date = today;
  saveStorage(data);
  return data.streak.count;
}

function pickTodaysItems(category, items, count = 5) {
  const data = loadStorage();
  const today = todayStr();
  if (data[category].studied[today]) {
    return data[category].studied[today].map(id => items.find(i => i.id === id)).filter(Boolean);
  }
  const srs = data[category].srs;
  const mastered = data[category].mastered;
  const dueItems = items.filter(i => srs[i.id] && srs[i.id].next_review <= today && !mastered.includes(i.id));
  const newItems = items.filter(i => !srs[i.id] && !mastered.includes(i.id));
  let selected = [];
  selected = selected.concat(shuffle([...dueItems]).slice(0, Math.min(3, dueItems.length)));
  const need = count - selected.length;
  if (need > 0) selected = selected.concat(shuffle([...newItems]).slice(0, need));
  if (selected.length < count) {
    const masteredItems = items.filter(i => mastered.includes(i.id));
    selected = selected.concat(shuffle([...masteredItems]).slice(0, count - selected.length));
  }
  data[category].studied[today] = selected.map(i => i.id);
  saveStorage(data);
  return selected;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function speak(text, lang = 'en-US') {
  if (!('speechSynthesis' in window)) { showToast('음성 합성 미지원', 'error'); return; }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang; utter.rate = 0.9; utter.pitch = 1.0;
  window.speechSynthesis.speak(utter);
}

// ============ 빈칸 채우기 모드 (Cloze Deletion) ============
function makeClozeText(sentence) {
  // 문장에서 핵심 단어 1~2개를 빈칸으로
  const words = sentence.split(' ');
  if (words.length < 3) return { html: '', answers: [] };
  // 3글자 이상이고 문장부호 없는 단어들 중에서 선택
  const candidates = words.map((w, i) => ({ word: w, idx: i, clean: w.replace(/[.,!?'"]/g, '') }))
    .filter(x => x.clean.length >= 3);
  if (candidates.length === 0) return { html: '', answers: [] };
  const blankCount = Math.min(2, Math.max(1, Math.floor(candidates.length / 3)));
  const blanks = shuffle([...candidates]).slice(0, blankCount).map(c => c.idx);
  const answers = blanks.map(idx => words[idx].replace(/[.,!?'"]/g, '').toLowerCase());
  const html = words.map((w, i) => {
    if (blanks.includes(i)) {
      const punct = w.match(/[.,!?'"]+$/)?.[0] || '';
      const blankIdx = blanks.indexOf(i);
      return `<input class="cloze-blank" data-idx="${blankIdx}" placeholder="?" />${punct}`;
    }
    return escapeHtml(w);
  }).join(' ');
  return { html, answers };
}

function renderClozeQuiz(item, num) {
  const cloze = makeClozeText(item.en);
  if (!cloze.html) {

}

function checkCloze(itemId, btn) {
  const card = btn.closest('.quiz-card');
  const item = englishData.find(i => i.id === itemId);
  const answers = JSON.parse(card.dataset.answers);
  const inputs = card.querySelectorAll('.cloze-blank');
  let allCorrect = true;
  inputs.forEach((inp, i) => {
    const ans = inp.value.trim().toLowerCase().replace(/[.,!?'"]/g, '');
    if (ans === answers[i]) {
      inp.classList.add('correct');
    } else {
      inp.classList.add('wrong');
      inp.value = answers[i];
      allCorrect = false;
    }
  });
  const data = loadStorage();
  data.english.total_quizzes += 1;
  const resultEl = document.getElementById('cloze-result-' + itemId);
  if (allCorrect) {
    data.english.total_correct += 1;
    resultEl.innerHTML = `<strong style="color:var(--success);">✅ 정답!</strong><br>${escapeHtml(item.en)}`;
    const cur = data.english.srs[itemId]?.interval || 0;
    data.english.srs[itemId] = calculateNextReview(cur, 'soso');
    addCoins(COIN_RULES.quiz_correct, '(정답!)');
    incrementCombo();
  } else {
    resultEl.innerHTML = `<strong style="color:var(--danger);">❌ 일부 오답</strong><br>전체 정답: ${escapeHtml(item.en)}`;
    data.english.srs[itemId] = calculateNextReview(0, 'hard');
    addCoins(COIN_RULES.quiz_wrong, '');
    resetCombo();
  }
  resultEl.classList.add('show');
  saveStorage(data);
  renderStats();
}

function renderLangQuizEasy(category, item, num, allData, fieldKey, lang) {
  const sameCat = allData.filter(i => i.cat === item.cat && i.id !== item.id);
  const wrongs = shuffle([...sameCat]).slice(0, 3);
  if (wrongs.length < 3) {
    const others = allData.filter(i => i.cat !== item.cat && i.id !== item.id);
    wrongs.push(...shuffle([...others]).slice(0, 3 - wrongs.length));
  }
  const allOptions = shuffle([item, ...wrongs]);
  const optionsHtml = allOptions.map((opt, i) =>
    `<div class="quiz-option" data-quiz="${category}-${item.id}" onclick="answerLangEasy('${category}', '${item.id}', '${opt.id}', '${fieldKey}')">${i+1}. ${escapeHtml(opt[fieldKey])}</div>`
  ).join('');
  return `
    <div class="quiz-card">
      <span class="lesson-num">#${num}</span>
      <span class="lesson-cat">${item.cat}</span>
      <div class="quiz-question">${escapeHtml(item.ko)}</div>
      <div class="quiz-options" id="opts-${category}-${item.id}">${optionsHtml}</div>
      <div class="lesson-actions" style="margin-top:8px;">
        <button class="btn btn-secondary btn-small" onclick="speak(${JSON.stringify(item[fieldKey])}, '${lang}')">🔊 발음</button>
      </div>
      <div class="quiz-explanation" id="exp-${category}-${item.id}"></div>
    </div>`;
}

function answerLangEasy(category, itemId, selectedId, fieldKey) {
  let allData = category === 'english' ? englishData : japaneseData;
  const item = allData.find(i => i.id === itemId);
  const data = loadStorage();
  data[category].total_quizzes += 1;
  const opts = document.querySelectorAll(`[data-quiz="${category}-${itemId}"]`);
  const isCorrect = itemId === selectedId;
  const correctText = item[fieldKey];
  const selectedItem = allData.find(i => i.id === selectedId);
  opts.forEach(opt => {
    opt.classList.add('disabled');
    opt.onclick = null;
    const optText = opt.textContent.replace(/^\d+\.\s*/, '').trim();
    if (optText === correctText) opt.classList.add('correct');
    else if (!isCorrect && selectedItem && optText === selectedItem[fieldKey]) opt.classList.add('wrong');
  });
  const expEl = document.getElementById('exp-' + category + '-' + itemId);
  let extraText = '';
  if (item.romaji) extraText = `<br><span style="color:var(--text-muted);font-size:13px;">[${escapeHtml(item.romaji)}]</span>`;
  else if (item.kr_pron) extraText = `<br><span style="color:var(--gold);font-size:13px;">🔤 ${escapeHtml(item.kr_pron)}</span>`;
  expEl.innerHTML = `<strong>${isCorrect ? '✅ 정답!' : '❌ 오답'}</strong><br>정답: <strong>${escapeHtml(correctText)}</strong>${extraText}`;
  expEl.classList.add('show');
  if (isCorrect) {
    data[category].total_correct += 1;
    const cur = data[category].srs[itemId]?.interval || 0;
    data[category].srs[itemId] = calculateNextReview(cur, 'soso');
    addCoins(COIN_RULES.quiz_correct, '(정답!)');
    incrementCombo();
  } else {
    data[category].srs[itemId] = calculateNextReview(0, 'hard');
    addCoins(COIN_RULES.quiz_wrong, '');
    resetCombo();
  }
  saveStorage(data);
  renderStats();
}

function markMastered(category, id) {
  const data = loadStorage();
  if (!data[category].mastered.includes(id)) data[category].mastered.push(id);
  saveStorage(data);
  addCoins(COIN_RULES.master, '(마스터!)');
  if (category === 'english') renderEnglish();
  else if (category === 'japanese') renderJapanese();
  else if (category === 'piping') renderPiping();
  else if (category === 'safety') renderSafety();
  renderStats();
}

function renderProjectItem(item, data) {
  if (item.type === 'info') {
    return `

        <div class="project-content">${escapeHtml(item.content)}</div>
      </div>`;
  }
  if (item.type === 'checklist') {
    const checks = data.project_checklist[item.id] || [];
    const itemsHtml = item.items.map((txt, i) => `
      <div class="project-checklist-item ${checks.includes(i) ? 'checked' : ''}">

        <label for="${item.id}-${i}">${escapeHtml(txt)}</label>
      </div>`).join('');
    const done = checks.length;

    return `
      <div class="project-section">
        <div class="project-section-title">${escapeHtml(item.title)}</div>

      <div class="calc-field">

function toggleProjectCheck(itemId, idx) {
  const data = loadStorage();
  if (!data.project_checklist[itemId]) data.project_checklist[itemId] = [];
  const checks = data.project_checklist[itemId];
  const at = checks.indexOf(idx);
  if (at > -1) checks.splice(at, 1);
  else checks.push(idx);
  saveStorage(data);
  renderProject();
}

function calcProfit(itemId) {
  const buyPrice = parseFloat(document.getElementById(`calc-${itemId}-buy_price`)?.value) || 0;
  const sellPrice = parseFloat(document.getElementById(`calc-${itemId}-sell_price`)?.value) || 0;
  const packaging = parseFloat(document.getElementById(`calc-${itemId}-packaging`)?.value) || 0;
  const shipping = parseFloat(document.getElementById(`calc-${itemId}-shipping`)?.value) || 0;
  const platformFee = parseFloat(document.getElementById(`calc-${itemId}-platform_fee`)?.value) || 0;
  const volume = parseFloat(document.getElementById(`calc-${itemId}-monthly_volume`)?.value) || 0;
  const fixedCost = parseFloat(document.getElementById(`calc-${itemId}-fixed_cost`)?.value) || 0;
  // 계산
  const totalCostPerKg = buyPrice + packaging + shipping;
  const feePerKg = sellPrice * (platformFee / 100);
  const profitPerKg = sellPrice - totalCostPerKg - feePerKg;
  const marginPct = sellPrice > 0 ? (profitPerKg / sellPrice * 100) : 0;
  const monthlyRevenue = sellPrice * volume;
  const monthlyProfit = (profitPerKg * volume) - fixedCost;
  const breakEvenVolume = profitPerKg > 0 ? Math.ceil(fixedCost / profitPerKg) : 0;
  const resultEl = document.getElementById(`calc-result-${itemId}`);
  resultEl.innerHTML = `
    <div class="calc-result-row"><span>kg당 총원가</span><span>${totalCostPerKg.toLocaleString()}원</span></div>
    <div class="calc-result-row"><span>kg당 수수료</span><span>${feePerKg.toLocaleString()}원</span></div>
    <div class="calc-result-row"><span>kg당 순이익</span><span style="color:${profitPerKg > 0 ? '#fbd38d' : '#fc8181'}">${profitPerKg.toLocaleString()}원</span></div>
    <div class="calc-result-row"><span>마진율</span><span>${marginPct.toFixed(1)}%</span></div>
    <div class="calc-result-row"><span>월 매출</span><span>${monthlyRevenue.toLocaleString()}원</span></div>
    <div class="calc-result-row"><span>월 고정비</span><span>${fixedCost.toLocaleString()}원</span></div>
    <div class="calc-result-row highlight"><span>월 순이익</span><span>${monthlyProfit.toLocaleString()}원</span></div>
    <div class="calc-result-row"><span>손익분기점</span><span>월 ${breakEvenVolume}kg 판매</span></div>`;
}

// ============ 백업 ============
function downloadBackup() {
  const data = loadStorage();
  data._exported_at = new Date().toISOString();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `sk_study_backup_${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('백업 다운로드 완료', 'success');
}
function uploadBackup(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.english) throw new Error('유효하지 않은 백업');
      const cat = () => ({ studied: {}, wrong: [], mastered: [], srs: {}, total_quizzes: 0, total_correct: 0 });
      ['english', 'japanese', 'piping', 'safety'].forEach(c => {
        if (!data[c]) data[c] = cat();
        if (!data[c].srs) data[c].srs = {};
      });
      if (!data.coins) data.coins = { total: 0, today: 0, last_date: null };
      if (!data.project_checklist) data.project_checklist = {};
      saveStorage(data);
      showToast('복원 완료', 'success');
      renderStats(); renderBackupProgress();
    } catch (err) { showToast('복원 실패: ' + err.message, 'error'); }
  };
  reader.readAsText(file);
}
function resetAll() {
  if (!confirm('모든 학습 기록과 코인을 삭제할까요?\n되돌릴 수 없습니다.')) return;
  localStorage.removeItem(STORAGE_KEY);
  showToast('초기화 완료', 'success');
  renderStats(); renderBackupProgress();
  renderEnglish(); renderJapanese(); renderPiping(); renderSafety();
}

function renderBackupProgress() {
  const data = loadStorage();
  const items = [
    { key: 'english', label: '🌏 영어', total: englishData.length },
    { key: 'japanese', label: '🇯🇵 일본어', total: japaneseData.length },
    { key: 'piping', label: '🔧 배관기능사', total: pipingData.length },
    { key: 'safety', label: '⛑️ 산업안전보건기사', total: safetyData.length }
  ];
  let html = '';
  items.forEach(it => {
    const c = data[it.key];
    const m = c.mastered.length;
    const srsCount = Object.keys(c.srs || {}).length;
    const pct = it.total > 0 ? Math.round((m / it.total) * 100) : 0;
    html += `
      <div style="margin-bottom:16px;">
        <strong>${it.label}</strong>
        <div style="font-size:13px;color:var(--text-muted);margin:4px 0;">
          마스터 ${m}개 / 전체 ${it.total}개 · SRS 추적 ${srsCount}개
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="font-size:12px;color:var(--text-muted);text-align:right;">${pct}%</div>
      </div>`;
  });
  const coins = data.coins || { total: 0 };
  const level = getLevel(coins.total);
  html += `
    <div style="padding:14px;background:linear-gradient(135deg, rgba(246,173,85,0.1), rgba(49,130,206,0.1));border-radius:8px;margin-bottom:12px;">
      <strong>🪙 누적 ${coins.total} 코인</strong> · <strong>Lv.${level.level} ${level.name}</strong>
    </div>
    <div style="padding:12px;background:var(--bg);border-radius:8px;font-size:13px;color:var(--text-sub);">
      <strong>💡 저장 위치:</strong> 브라우저 localStorage<br>
      다른 PC에서 이어가려면: 다운로드 → 구글 드라이브 → 복원
    </div>`;
  document.getElementById('progress-detail').innerHTML = html;
}

function showToast(msg, type = 'info') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// 이벤트
document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

document.querySelectorAll('.tabs .tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tabs .tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    state.activeTab = t.dataset.tab;
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    document.getElementById('tab-' + t.dataset.tab).style.display = '';
    if (t.dataset.tab === 'backup') renderBackupProgress();
    if (t.dataset.tab === 'project') renderProject();
  });
});

document.querySelectorAll('[data-mode-english]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mode-english]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.englishMode = btn.dataset.modeEnglish;
    renderEnglish();
  });
});
document.querySelectorAll('[data-mode-japanese]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mode-japanese]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.japaneseMode = btn.dataset.modeJapanese;
    renderJapanese();
  });
});
document.querySelectorAll('[data-mode-piping]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mode-piping]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.pipingMode = btn.dataset.modePiping;
    renderPiping();
  });
});
document.querySelectorAll('[data-mode-safety]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mode-safety]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.safetyMode = btn.dataset.modeSafety;
    renderSafety();
  });
});

document.getElementById('btn-download').addEventListener('click', downloadBackup);
document.getElementById('btn-upload-trigger').addEventListener('click', () => document.getElementById('file-upload').click());
document.getElementById('file-upload').addEventListener('change', (e) => {
  if (e.target.files[0]) uploadBackup(e.target.files[0]);
});
document.getElementById('btn-reset').addEventListener('click', resetAll);

async function init() {
  initTheme();
  showTip(0);
  // 세션 인증 복원
  if (sessionStorage.getItem('project_authed') === '1') state.projectAuthed = true;
  try {
    const [engRes, jpRes, pipRes, safRes, projRes] = await Promise.all([
      fetch('english.json'),
      fetch('japanese.json'),
      fetch('piping.json'),
      fetch('safety.json'),
      fetch('project.json')
    ]);
    englishData = await engRes.json();
    japaneseData = await jpRes.json();
    pipingData = await pipRes.json();
    safetyData = await safRes.json();
    projectData = await projRes.json();
  } catch (e) {
    showToast('데이터 로드 실패: ' + e.message, 'error');
    return;
  }
  renderStats();
  renderEnglish();
  renderJapanese();
  renderPiping();
  renderSafety();
  setInterval(() => {
    if (state.activeTab !== 'backup' && state.activeTab !== 'project') nextTip();
  }, 10000);
}

init();
</script>
