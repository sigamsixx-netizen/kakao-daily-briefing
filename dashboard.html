<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📰 SK아카데미 일일 이슈 대시보드</title>
<style>
  :root {
    --bg: #f5f7fa;
    --card: #ffffff;
    --text: #1a202c;
    --text-sub: #4a5568;
    --text-muted: #718096;
    --border: #e2e8f0;
    --accent: #3182ce;
    --accent-hover: #2c5282;
    --up: #e53e3e;
    --down: #3182ce;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.08);
  }

  [data-theme="dark"] {
    --bg: #0f1419;
    --card: #1a202c;
    --text: #f7fafc;
    --text-sub: #cbd5e0;
    --text-muted: #a0aec0;
    --border: #2d3748;
    --accent: #63b3ed;
    --accent-hover: #4299e1;
    --up: #fc8181;
    --down: #63b3ed;
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    transition: background 0.3s ease, color 0.3s ease;
  }

  .container { max-width: 1280px; margin: 0 auto; padding: 24px; }

  header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px; flex-wrap: wrap; gap: 16px;
  }

  .header-left h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .header-left .subtitle { color: var(--text-muted); font-size: 14px; }

  .header-controls {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }

  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; background: var(--card);
    border: 1px solid var(--border); border-radius: 20px;
    font-size: 13px; color: var(--text-sub); box-shadow: var(--shadow);
  }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #48bb78; animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .icon-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 8px 14px; border-radius: 8px;
    cursor: pointer; font-size: 14px; font-weight: 500;
    box-shadow: var(--shadow); transition: all 0.2s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }

  .icon-btn:hover {
    box-shadow: var(--shadow-hover); transform: translateY(-1px);
  }

  .nav-link {
    padding: 8px 14px; border-radius: 8px; text-decoration: none;
    color: var(--text-sub); font-size: 14px; font-weight: 500;
    background: var(--card); border: 1px solid var(--border);
    transition: all 0.2s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .nav-link:hover { box-shadow: var(--shadow-hover); }
  .nav-link.active { background: var(--accent); color: white; border-color: var(--accent); }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--card); border-radius: 12px; padding: 20px;
    box-shadow: var(--shadow); border: 1px solid var(--border);
    transition: all 0.2s ease;
  }

  .card-full { grid-column: 1 / -1; }

  .card-title {
    font-size: 16px; font-weight: 600; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }

  /* 날씨 */
  .weather-current {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 16px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .weather-icon { font-size: 48px; }
  .weather-temp { font-size: 36px; font-weight: 700; }
  .weather-meta { color: var(--text-muted); font-size: 13px; margin-top: 4px; }

  .weather-daily { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .weather-day {
    text-align: center; padding: 10px 4px;
    background: var(--bg); border-radius: 8px;
  }
  .weather-day .day-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .weather-day .day-icon { font-size: 24px; margin-bottom: 4px; }
  .weather-day .day-temp { font-size: 13px; font-weight: 600; }
  .weather-day .day-rain { font-size: 11px; color: var(--accent); margin-top: 2px; }

  /* 시장 */
  .market-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .market-item {
    text-align: center; padding: 12px; background: var(--bg);
    border-radius: 8px; transition: all 0.15s ease;
  }
  .market-item:hover {
    transform: translateY(-2px); box-shadow: var(--shadow-hover);
  }
  .market-item .label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .market-item .value { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
  .market-item .change { font-size: 13px; font-weight: 600; }

  .up { color: var(--up); }
  .down { color: var(--down); }
  .flat { color: var(--text-muted); }

  /* 주식 탭 */
  .stock-tabs {
    display: flex; gap: 4px; margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .stock-tab {
    padding: 8px 16px; cursor: pointer; background: transparent;
    border: none; color: var(--text-muted); font-size: 14px;
    font-weight: 500; border-bottom: 2px solid transparent;
    transition: all 0.2s ease;
  }
  .stock-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .stock-list { list-style: none; }
  .stock-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px;
    text-decoration: none; color: var(--text);
    transition: all 0.15s ease;
  }
  .stock-item:hover {
    background: var(--bg); padding-left: 8px; padding-right: 8px;
    border-radius: 6px;
  }
  .stock-item:last-child { border-bottom: none; }
  .stock-item .ext-icon {
    font-size: 11px; color: var(--text-muted); margin-left: 6px;
  }

  .stock-rank {
    display: inline-block; width: 24px; height: 24px;
    line-height: 24px; text-align: center; font-size: 12px;
    font-weight: 700; background: var(--accent); color: white;
    border-radius: 50%; margin-right: 8px;
  }

  /* 뉴스 */
  .news-controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-box {
    flex: 1; min-width: 200px; padding: 8px 14px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); font-size: 14px;
  }
  .search-box:focus { outline: none; border-color: var(--accent); }

  .filter-chips { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .chip {
    padding: 6px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 16px; cursor: pointer; font-size: 13px;
    transition: all 0.2s ease; color: var(--text-sub);
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active { background: var(--accent); color: white; border-color: var(--accent); }

  .news-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px;
  }

  .news-item {
    padding: 14px; background: var(--bg); border-radius: 8px;
    border: 1px solid var(--border); transition: all 0.2s ease;
    cursor: pointer; text-decoration: none; color: var(--text); display: block;
  }
  .news-item:hover {
    transform: translateY(-2px); box-shadow: var(--shadow-hover);
    border-color: var(--accent);
  }
  .news-category {
    display: inline-block; padding: 2px 8px; background: var(--accent);
    color: white; border-radius: 4px; font-size: 11px;
    font-weight: 600; margin-bottom: 8px;
  }
  .news-title { font-size: 14px; font-weight: 500; line-height: 1.4; color: var(--text); }

  /* 로딩 */
  .loading { text-align: center; padding: 40px; color: var(--text-muted); }
  .empty-state { text-align: center; padding: 24px; color: var(--text-muted); font-size: 14px; }

  /* 푸터 */
  footer {
    margin-top: 32px; padding: 20px; text-align: center;
    color: var(--text-muted); font-size: 12px; border-top: 1px solid var(--border);
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="header-left">
        <h1>📰 SK아카데미 일일 이슈 대시보드</h1>
        <div class="subtitle" id="subtitle">데이터 로딩 중...</div>
      </div>
      <div class="nav" style="margin-top:12px; display:flex; gap:8px;">
        <a href="dashboard.html" class="nav-link active">📰 대시보드</a>
        <a href="study.html" class="nav-link">📚 자기 발전</a>
      </div>
    </div>
    <div class="header-controls">
      <span class="status-badge">
        <span class="status-dot"></span>
        <span id="last-update">대기 중</span>
      </span>
      <button class="icon-btn" id="refresh-btn">🔄 새로고침</button>
      <button class="icon-btn" id="theme-toggle">🌙 다크</button>
    </div>
  </header>

  <div class="grid">

    <!-- 1. 날씨 -->
    <div class="card">
      <div class="card-title">🌤️ 서울 날씨</div>
      <div id="weather-content"><div class="loading">로딩 중...</div></div>
    </div>

    <!-- 2. 시장 지표 -->
    <div class="card">
      <div class="card-title">💹 시장 지표</div>
      <div id="market-content"><div class="loading">로딩 중...</div></div>
    </div>

    <!-- 3. 주식 TOP -->
    <div class="card card-full">
      <div class="card-title">📊 코스피 TOP 종목</div>
      <div class="stock-tabs" id="stock-tabs">
        <button class="stock-tab active" data-tab="up">🔺 상승률 TOP 3</button>
        <button class="stock-tab" data-tab="down">🔻 하락률 TOP 3</button>
        <button class="stock-tab" data-tab="volume">📈 거래량 TOP 3</button>
      </div>
      <ul class="stock-list" id="stock-list">
        <li class="loading">로딩 중...</li>
      </ul>
    </div>

    <!-- 4. 뉴스 -->
    <div class="card card-full">
      <div class="card-title">📰 주요 뉴스</div>

      <div class="news-controls">
        <input type="text" id="news-search" class="search-box" placeholder="🔍 뉴스 검색 (제목으로 필터링)">
      </div>

      <div class="filter-chips" id="filter-chips">
        <span class="chip active" data-cat="all">전체</span>
        <span class="chip" data-cat="정치">🏛️ 정치</span>
        <span class="chip" data-cat="경제">💼 경제</span>
        <span class="chip" data-cat="사회">👥 사회</span>
        <span class="chip" data-cat="국제">🌏 국제</span>
        <span class="chip" data-cat="IT">💻 IT</span>
      </div>

      <div class="news-grid" id="news-grid">
        <div class="loading">로딩 중...</div>
      </div>
    </div>

  </div>

  <footer>
    <div>📅 데이터 출처: Open-Meteo (날씨), 네이버 금융 (주식), 동아일보 RSS (뉴스)</div>
    <div style="margin-top:6px">⚠️ 종목 정보는 단순 시세 데이터이며 투자 판단의 근거가 아닙니다</div>
    <div style="margin-top:6px">🔄 데이터는 매일 9시/13시/18시 자동 업데이트</div>
  </footer>

</div>

<script>
const state = {
  data: null,
  activeStockTab: 'up',
  activeCategory: 'all',
  searchQuery: ''
};

// ========== 다크모드 ==========
function initTheme() {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeButton();
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeButton();
}

function updateThemeButton() {
  const t = document.documentElement.getAttribute('data-theme');
  document.getElementById('theme-toggle').textContent = t === 'dark' ? '☀️ 라이트' : '🌙 다크';
}

// ========== 데이터 로드 ==========
async function loadData() {
  try {
    // 캐시 방지를 위한 timestamp 쿼리
    const res = await fetch(`data.json?t=${Date.now()}`);
    if (!res.ok) throw new Error('data.json 없음');
    state.data = await res.json();
    renderAll();
  } catch (e) {
    console.error('데이터 로드 실패:', e);
    document.getElementById('subtitle').textContent = '⚠️ 데이터 로드 실패 — 아직 첫 업데이트 전일 수 있어요';
    document.getElementById('weather-content').innerHTML = '<div class="empty-state">데이터 없음<br><small>매일 9시/13시/18시에 자동 업데이트됩니다</small></div>';
    document.getElementById('market-content').innerHTML = '<div class="empty-state">데이터 없음</div>';
    document.getElementById('stock-list').innerHTML = '<li class="empty-state">데이터 없음</li>';
    document.getElementById('news-grid').innerHTML = '<div class="empty-state">데이터 없음</div>';
  }
}

function renderAll() {
  if (!state.data) return;

  // 업데이트 시각
  const updated = state.data.updated_at_display || '';
  document.getElementById('subtitle').textContent = `최종 업데이트: ${updated}`;
  document.getElementById('last-update').textContent = `최종: ${updated.split(' ')[1] || ''}`;

  renderWeather();
  renderMarket();
  renderStockTop();
  renderNews();
}

// ========== 날씨 ==========
function renderWeather() {
  const w = state.data.weather;
  if (!w) {
    document.getElementById('weather-content').innerHTML = '<div class="empty-state">날씨 데이터 없음</div>';
    return;
  }

  let html = `
    <div class="weather-current">
      <div class="weather-icon">${w.current.icon}</div>
      <div>
        <div class="weather-temp">${w.current.temp}°C</div>
        <div style="color: var(--text-sub); font-size: 14px;">${w.current.label}</div>
        <div class="weather-meta">습도 ${w.current.humidity}% · 바람 ${w.current.wind}m/s</div>
      </div>
    </div>
    <div class="weather-daily">
  `;
  w.daily.forEach((d, i) => {
    const label = i === 0 ? '오늘' : `${d.date} (${d.weekday})`;
    const rain = d.rain > 0 ? `<div class="day-rain">☔ ${Math.round(d.rain)}%</div>` : '';
    html += `
      <div class="weather-day">
        <div class="day-label">${label}</div>
        <div class="day-icon">${d.icon}</div>
        <div class="day-temp">${Math.round(d.max)}° / ${Math.round(d.min)}°</div>
        ${rain}
      </div>
    `;
  });
  html += '</div>';
  document.getElementById('weather-content').innerHTML = html;
}

// ========== 시장 지표 ==========
function renderMarket() {
  const indices = state.data.indices || [];
  if (indices.length === 0) {
    document.getElementById('market-content').innerHTML = '<div class="empty-state">시장 데이터 없음</div>';
    return;
  }
  // 시장 지표별 네이버 금융 URL
  const urlMap = {
    "코스피": "https://finance.naver.com/sise/sise_index.naver?code=KOSPI",
    "코스닥": "https://finance.naver.com/sise/sise_index.naver?code=KOSDAQ",
    "원/달러": "https://finance.naver.com/marketindex/exchangeDetail.naver?marketindexCd=FX_USDKRW"
  };
  let html = '<div class="market-grid">';
  indices.forEach(i => {
    const cls = i.change.startsWith('▲') ? 'up' : (i.change.startsWith('▼') ? 'down' : 'flat');
    const url = urlMap[i.name] || `https://finance.naver.com/search/search.naver?query=${encodeURIComponent(i.name)}`;
    html += `
      <a href="${url}" target="_blank" rel="noopener" class="market-item" style="text-decoration:none; color:inherit; display:block;" title="네이버 금융에서 ${escapeHtml(i.name)} 상세 보기">
        <div class="label">${i.name} <span style="font-size:10px;color:var(--text-muted);">↗</span></div>
        <div class="value">${i.value}</div>
        <div class="change ${cls}">${i.change}</div>
      </a>
    `;
  });
  html += '</div>';
  document.getElementById('market-content').innerHTML = html;
}

// ========== 주식 TOP ==========
function renderStockTop() {
  const movers = state.data.movers || {};
  const items = movers[state.activeStockTab] || [];

  if (items.length === 0) {
    document.getElementById('stock-list').innerHTML = '<li class="empty-state">데이터 없음</li>';
    return;
  }

  let html = '';
  items.forEach((item, i) => {
    const cls = item.change.startsWith('▲') ? 'up' : (item.change.startsWith('▼') ? 'down' : 'flat');
    // 네이버 금융 URL (종목코드 있으면 사용, 없으면 검색)
    const naverUrl = item.code
      ? `https://finance.naver.com/item/main.naver?code=${item.code}`
      : `https://finance.naver.com/search/search.naver?query=${encodeURIComponent(item.name)}`;
    html += `
      <a href="${naverUrl}" target="_blank" rel="noopener" class="stock-item" title="네이버 금융에서 ${escapeHtml(item.name)} 상세 보기">
        <div>
          <span class="stock-rank">${i + 1}</span>
          ${escapeHtml(item.name)}
          <span class="ext-icon">↗</span>
        </div>
        <div class="${cls}" style="font-weight: 600;">${item.change}</div>
      </a>
    `;
  });
  document.getElementById('stock-list').innerHTML = html;
}

// ========== 뉴스 ==========
function renderNews() {
  const headlines = state.data.headlines || {};
  const grid = document.getElementById('news-grid');
  const allItems = [];

  Object.entries(headlines).forEach(([cat, items]) => {
    items.forEach(title => {
      // 뉴스는 title만 있음 (link는 없음)
      // 검색을 위해 네이버 뉴스 검색으로 연결
      const searchUrl = `https://search.naver.com/search.naver?where=news&query=${encodeURIComponent(title)}`;
      allItems.push({ title, link: searchUrl, category: cat });
    });
  });

  let filtered = allItems;
  if (state.activeCategory !== 'all') {
    filtered = filtered.filter(item => item.category === state.activeCategory);
  }
  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    filtered = filtered.filter(item => item.title.toLowerCase().includes(q));
  }

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">조건에 맞는 뉴스가 없습니다</div>';
    return;
  }

  grid.innerHTML = filtered.map(item => `
    <a href="${item.link}" target="_blank" rel="noopener" class="news-item">
      <span class="news-category">${item.category}</span>
      <div class="news-title">${escapeHtml(item.title)}</div>
    </a>
  `).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ========== 이벤트 ==========
document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
document.getElementById('refresh-btn').addEventListener('click', loadData);

document.getElementById('news-search').addEventListener('input', (e) => {
  state.searchQuery = e.target.value;
  renderNews();
});

document.getElementById('filter-chips').addEventListener('click', (e) => {
  if (e.target.classList.contains('chip')) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    state.activeCategory = e.target.dataset.cat;
    renderNews();
  }
});

document.getElementById('stock-tabs').addEventListener('click', (e) => {
  if (e.target.classList.contains('stock-tab')) {
    document.querySelectorAll('.stock-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    state.activeStockTab = e.target.dataset.tab;
    renderStockTop();
  }
});

// ========== 초기화 + 자동 새로고침 ==========
initTheme();
loadData();

// 5분마다 자동 새로고침
setInterval(loadData, 5 * 60 * 1000);
</script>

</body>
</html>
